<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المرضى والحجوزات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .navbar { background: #0f5132; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 16px; border-radius: 5px; }
        .navbar a:hover { background: #157347; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .form-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; min-width: 300px; border-top: 5px solid #0f5132; }
        .table-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 2; min-width: 500px; border-top: 5px solid #0f5132; }
        h3 { margin-top: 0; color: #0f5132; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background: #0f5132; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: #157347; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #0f5132; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .status.waiting { background: #fff3cd; color: #856404; }
        .status.done { background: #d1e7dd; color: #0f5132; }
        .clear-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; float: left; font-size: 12px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="dashboard.html">📊 لوحة التحكم (الداش بورد)</a>
        <a href="#" style="background: #157347;">👥 الحجوزات والمرضى</a>
    </div>

    <div class="container">
        <div class="form-section">
            <h3>تسجيل حجز جديد</h3>
            <form id="appointmentForm">
                <div class="form-group">
                    <label>اسم المريض</label>
                    <input type="text" id="patientName" placeholder="الاسم ثلاثي" required>
                </div>
                <div class="form-group">
                    <label>رقم التليفون</label>
                    <input type="tel" id="patientPhone" placeholder="01XXXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>نوع الخدمة</label>
                    <select id="serviceType">
                        <option value="كشف جديد" data-price="300">كشف جديد (300 جنيه)</option>
                        <option value="جلسة علاج طبيعي" data-price="200">جلسة علاج طبيعي (200 جنيه)</option>
                        <option value="باكج تأهيل" data-price="1500">باكج تأهيل مكثف (1500 جنيه)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الدكتور المعالج</label>
                    <select id="doctorName">
                        <option value="د. أحمد إسماعيل">د. أحمد إسماعيل</option>
                        <option value="د. سارة ممدوح">د. سارة ممدوح</option>
                    </select>
                </div>
                <button type="submit" class="btn">تأكيد الحجز وحفظ البيانات</button>
            </form>
        </div>

        <div class="table-section">
            <h3>قائمة حجوزات اليوم <button class="clear-btn" onclick="clearData()">تصفير اليومية 🗑️</button></h3>
            <table>
                <thead>
                    <tr>
                        <th>اسم المريض</th>
                        <th>نوع الخدمة</th>
                        <th>الدكتور</th>
                        <th>المبلغ</th>
                        <th>الحالة (اضغط للتغيير)</th>
                    </tr>
                </thead>
                <tbody id="appointmentsTable">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // تحميل البيانات المحفوظة عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', loadAppointments);

        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('patientName').value;
            const service = document.getElementById('serviceType').value;
            const doctor = document.getElementById('doctorName').value;
            const selectEl = document.getElementById('serviceType');
            const price = parseInt(selectEl.options[selectEl.selectedIndex].getAttribute('data-price'));

            const appointment = {
                id: Date.now(),
                name: name,
                service: service,
                doctor: doctor,
                price: price,
                status: 'waiting' // الافتراضي في الانتظار
            };

            let appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [];
            appointments.push(appointment);
            localStorage.setItem('clinic_appointments', JSON.stringify(appointments));

            renderTable();
            document.getElementById('appointmentForm').reset();
        });

        function loadAppointments() {
            renderTable();
        }

        function renderTable() {
            let appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [];
            const table = document.getElementById('appointmentsTable');
            table.innerHTML = '';

            appointments.forEach(app => {
                const statusText = app.status === 'done' ? 'تمت الجلسة والدفع' : 'في الانتظار - اضغط للدفع';
                const statusClass = app.status === 'done' ? 'status done' : 'status waiting';
                
                const row = `
                    <tr>
                        <td>${app.name}</td>
                        <td>${app.service}</td>
                        <td>${app.doctor}</td>
                        <td>${app.price} جنيه</td>
                        <td><span class="${statusClass}" onclick="toggleStatus(${app.id})">${statusText}</span></td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        }

        // تغيير حالة الدفع عند الضغط عليها
        function toggleStatus(id) {
            let appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [];
            appointments = appointments.map(app => {
                if(app.id === id) {
                    app.status = app.status === 'waiting' ? 'done' : 'waiting';
                }
                return app;
            });
            localStorage.setItem('clinic_appointments', JSON.stringify(appointments));
            renderTable();
        }

        function clearData() {
            if(confirm('هل أنت متأكد من تصفير بيانات اليوم؟')) {
                localStorage.removeItem('clinic_appointments');
                renderTable();
            }
        }
    </script>
</body>
</html>
