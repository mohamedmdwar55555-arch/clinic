<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مَدَى لإدارة العلاج الطبيعي - MADA Physio Clinic</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary-color: #0f5132; 
            --secondary-color: #157347; 
            --light-bg: #f4f6f9; 
            --dark-color: #212529;
            --success-color: #198754;
            --expense-color: #dc3545;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light-bg); margin: 0; padding: 20px; color: #333; }
        
        /* شريط التنقل العلوي (التابات) */
        .navbar { 
            background: var(--primary-color); 
            padding: 10px 20px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            display: flex; 
            gap: 15px; 
        }
        .tab-btn { background: none; border: none; color: white; font-weight: bold; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 15px; }
        .tab-btn:hover, .tab-btn.active { background: var(--secondary-color); }

        /* الهيدر الاحترافي الجديد الموزع بشكل متناسق */
        .main-header { 
            background: var(--primary-color); 
            padding: 20px 30px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08); 
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        
        /* صندوق اللوجو بأبعاد تسمح بظهوره كاملاً وبوضوح */
        .logo-container {
            height: 75px;
            width: auto;
            display: flex;
            align-items: center;
        }
        .logo-container img {
            height: 100%;
            width: auto;
            object-fit: contain;
        }

        .logo-text { text-align: right; }
        .logo-text h2 { 
            margin: 0; 
            font-size: 28px; 
            color: white; 
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .logo-text p { 
            margin: 5px 0 0 0; 
            font-size: 12px; 
            color: #d1e7dd; 
            letter-spacing: 1.5px; 
            font-weight: 500;
        }

        .system-status { font-weight: bold; color: #e1e7dd; font-size: 15px; }

        /* محتوى التابات والكروت */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .cards-container { display: flex; gap: 20px; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 200px; border-top: 5px solid var(--primary-color); text-align: center;}
        .card.profit { border-top-color: var(--success-color); }
        .card.loss { border-top-color: var(--expense-color); }
        .card h3 { margin: 0 0 10px 0; color: #666; font-size: 16px; }
        .card .number { font-size: 24px; font-weight: bold; color: #111; }
        
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 400px; }

        .dashboard-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .form-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 300px; }
        .table-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 2; min-width: 500px; }
        
        h3 { margin-top: 0; color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        .btn:hover { background: var(--secondary-color); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; }
        th { background-color: #f4f6f9; color: var(--primary-color); }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge.success { background: #d1e7dd; color: #0f5132; }
        .badge.warning { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="tab-btn active" onclick="switchTab('dashboard-tab')">📊 لوحة التحكم العامة</button>
        <button class="tab-btn" onclick="switchTab('patients-tab')">👥 الحجوزات وسجل المرضى</button>
    </div>

    <div class="main-header">
        <div class="logo-area">
            <div class="logo-container">
                <img src="mada_logo.png" alt="MADA Physio Clinic Logo">
            </div>
            <div class="logo-text">
                <h2>مَدَى Physio Clinic</h2>
                <p>NATURE'S HEALING TOUCH</p>
            </div>
        </div>
        <div class="system-status">نظام المتابعة الفورية والتشغيل لايف 🖥️</div>
    </div>

    <div id="dashboard-tab" class="tab-content active">
        <div class="cards-container">
            <div class="card profit">
                <h3>إيرادات اليوم الحقيقية</h3>
                <div class="number" id="todayRevenue">0 جنيه</div>
            </div>
            <div class="card">
                <h3>إجمالي حالات اليوم</h3>
                <div class="number" id="todayCases">0 حالة</div>
            </div>
            <div class="card loss">
                <h3>مصروفات تقديرية</h3>
                <div class="number">450 جنيه</div>
            </div>
            <div class="card profit">
                <h3>صافي الربح اللحظي</h3>
                <div class="number" id="netProfit" style="color: #198754;">0 جنيه</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <div id="patients-tab" class="tab-content">
        <div class="dashboard-layout">
            <div class="form-section">
                <h3>تسجيل حجز جديد</h3>
                <form id="appointmentForm">
                    <div class="form-group">
                        <label>اسم المريض</label>
                        <input type="text" id="patientName" placeholder="الاسم ثنائي أو ثلاثي" required>
                    </div>
                    <div class="form-group">
                        <label>رقم التليفون</label>
                        <input type="tel" id="patientPhone" placeholder="01XXXXXXXXX" required>
                    </div>
                    <div class="form-group">
                        <label>نوع الخدمة</label>
                        <select id="serviceType" required>
                            <option value="جلسة علاج طبيعي" data-price="200">جلسة علاج طبيعي (200 جنيه)</option>
                            <option value="كشف جديد" data-price="300">كشف جديد (300 جنيه)</option>
                            <option value="استشارة تأهيلية" data-price="100">استشارة تأهيلية (100 جنيه)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الدكتور المعالج</label>
                        <select id="doctorName" required>
                            <option value="د. أحمد إسماعيل">د. أحمد إسماعيل</option>
                            <option value="د. سارة ممدوح">د. سارة ممدوح</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">%تقييد الحجز وحفظ البيانات%</button>
                </form>
            </div>

            <div class="table-section">
                <h3>قائمة حجوزات اليوم</h3>
                <table>
                    <thead>
                        <tr>
                            <th>اسم المريض</th>
                            <th>نوع الخدمة</th>
                            <th>الدكتور</th>
                            <th>المبلغ</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if(tabId === 'dashboard-tab') calculateDashboardData();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAppointments();
            calculateDashboardData();
        });

        function calculateDashboardData() {
            let appointments = JSON.parse(localStorage.getItem('clinic_appointments')) || [];
            let todayRevenue = 0;
            let todayCases = appointments.length;

            appointments.forEach(app => {
                todayRevenue += parseFloat(app.price || 0);
            });

            let estimatedLoss = 450; 
            let netProfit = todayRevenue - estimatedLoss;

            document.getElementById('todayRevenue').innerText = todayRevenue.toLocaleString() + ' جنيه';
            document.getElementById('todayCases').innerText = todayCases + ' حالة';
            document.getElementById('netProfit').innerText = (netProfit >= 0 ? '+ ' : '') + netProfit.toLocaleString() + ' جنيه';

            initChart(todayRevenue);
        }

        function initChart(revenue) {
            const chartCanvas = document.getElementById('salesChart');
            if (window.myChartInstance) { window.myChartInstance.destroy(); }
            
            const ctx = chartCanvas.getContext('2d');
            window.myChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels:
